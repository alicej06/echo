name: EMG-ASL CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Smoke tests across Python 3.11 and 3.12
  # ---------------------------------------------------------------------------
  test:
    name: Smoke Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libsndfile1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests (8/8 must pass)
        run: python scripts/smoke_test.py

      - name: Run pipeline demo (synthetic data, no hardware)
        run: python scripts/demo_pipeline.py

      - name: Verify ONNX baseline model can be created
        run: python scripts/train_synthetic_baseline.py

      - name: Check model file created
        run: |
          ls -lh models/asl_emg_classifier.onnx
          python -c "import onnxruntime as ort; sess = ort.InferenceSession('models/asl_emg_classifier.onnx'); print('ONNX model OK:', sess.get_inputs()[0].shape)"

  # ---------------------------------------------------------------------------
  # Lint with ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ scripts/ --ignore E501,E402

  # ---------------------------------------------------------------------------
  # Docker build verification (gated on test passing)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: maia-emg-asl:ci
