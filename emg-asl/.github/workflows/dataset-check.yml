name: Dataset URL Health Check

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:

jobs:
  check-urls:
    name: Verify dataset URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PhysioNet GRABMyo
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://physionet.org/content/grabmyo/1.1.0/)
          echo "GRABMyo status: $STATUS"
          [ "$STATUS" = "200" ] || echo "WARNING: GRABMyo URL returned $STATUS"

      - name: Check Italian SL GitHub repo
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://github.com/airtlab/An-EMG-and-IMU-Dataset-for-the-Italian-Sign-Language-Alphabet)
          echo "Italian SL status: $STATUS"
          [ "$STATUS" = "200" ] || echo "WARNING: Italian SL URL returned $STATUS"

      - name: Check NinaProDB
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ninapro.hevs.ch/instructions/DB1.html)
          echo "NinaProDB status: $STATUS"
          [ "$STATUS" = "200" ] || echo "WARNING: NinaProDB URL returned $STATUS"

      - name: Check RIT MABL ASLA
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mabl.rit.edu/datasets/asla/)
          echo "ASLA status: $STATUS"
          [ "$STATUS" = "200" ] || echo "WARNING: ASLA URL returned $STATUS"
