name: Model Training

on:
  # Manual trigger with configurable hyperparameters
  workflow_dispatch:
    inputs:
      epochs:
        description: "Number of training epochs"
        required: false
        default: "100"
        type: string
      batch_size:
        description: "Training batch size"
        required: false
        default: "32"
        type: string
      runner_type:
        description: "Runner to use (ubuntu-latest or self-hosted GPU)"
        required: false
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted

  # Weekly scheduled re-train every Monday at 03:00 UTC
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: model-training
  cancel-in-progress: false

jobs:
  train:
    name: Train EMG-ASL Classifier
    runs-on: ${{ github.event.inputs.runner_type || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-training-${{ runner.os }}-py311-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-training-${{ runner.os }}-py311-

      - name: Install dependencies
        run: pip install -r requirements.txt jupyter nbconvert

      - name: Set training hyperparameters
        run: |
          echo "TRAINING_EPOCHS=${{ github.event.inputs.epochs || '100' }}" >> $GITHUB_ENV
          echo "TRAINING_BATCH_SIZE=${{ github.event.inputs.batch_size || '32' }}" >> $GITHUB_ENV
          echo "RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV

      - name: Parameterize training notebook
        run: |
          # Inject hyperparameters as a prepended parameters cell via nbconvert
          python - <<'EOF'
          import json, pathlib, os

          nb_path = pathlib.Path("notebooks/03_model_training.ipynb")
          nb = json.loads(nb_path.read_text())

          param_cell = {
              "cell_type": "code",
              "execution_count": None,
              "metadata": {"tags": ["parameters"]},
              "outputs": [],
              "source": [
                  f"EPOCHS = {os.environ['TRAINING_EPOCHS']}\n",
                  f"BATCH_SIZE = {os.environ['TRAINING_BATCH_SIZE']}\n",
                  f"RUN_ID = '{os.environ['RUN_ID']}'\n",
                  "MODEL_OUTPUT = 'models/asl_emg_classifier_ci.onnx'\n",
              ],
          }

          # Insert parameters cell at position 0
          nb["cells"].insert(0, param_cell)
          nb_path.with_name("03_model_training_ci.ipynb").write_text(json.dumps(nb, indent=2))
          print("Parameterized notebook written.")
          EOF

      - name: Execute training notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=7200 \
            --output notebooks/03_model_training_ci_executed.ipynb \
            notebooks/03_model_training_ci.ipynb

      - name: Verify model output exists
        run: |
          if [ ! -f "models/asl_emg_classifier_ci.onnx" ]; then
            echo "ERROR: Model file was not produced by training notebook."
            exit 1
          fi
          echo "Model file size: $(du -sh models/asl_emg_classifier_ci.onnx)"

      - name: Rename artifact with run ID
        run: |
          cp models/asl_emg_classifier_ci.onnx models/asl_emg_classifier_${{ github.run_id }}.onnx

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: emg-asl-model-${{ github.run_id }}
          path: |
            models/asl_emg_classifier_${{ github.run_id }}.onnx
            notebooks/03_model_training_ci_executed.ipynb
          retention-days: 90

      - name: Upload training notebook (executed)
        uses: actions/upload-artifact@v4
        with:
          name: training-notebook-${{ github.run_id }}
          path: notebooks/03_model_training_ci_executed.ipynb
          retention-days: 30

      - name: Summary
        run: |
          echo "## Training Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Epochs | ${{ github.event.inputs.epochs || '100' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch Size | ${{ github.event.inputs.batch_size || '32' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | emg-asl-model-${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
